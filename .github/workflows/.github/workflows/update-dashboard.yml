name: Update Job Dashboard Daily

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - run: npm install
      
      - run: node update-jobs.js
      
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add *.html
          git commit -m "🤖 Auto-update dashboard" || true
          git push || true
