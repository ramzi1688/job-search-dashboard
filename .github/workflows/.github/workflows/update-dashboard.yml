name: Update Job Dashboard Daily

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Generate dashboard
        run: node update-jobs.js
      
      - name: Push changes
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@dashboard.local"
          git add *.html
          if git diff --quiet --cached; then echo "No changes"; else git commit -m "Update dashboard"; git push; fi
