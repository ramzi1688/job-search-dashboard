name: Update Job Dashboard Daily

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4.1.7
      
      - name: Create dashboard
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Job Search Dashboard</title>
          <style>
          body { font-family: system-ui; background: #f5f5f5; padding: 20px; }
          .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
          h1 { font-size: 28px; margin-bottom: 10px; }
          table { width: 100%; border-collapse: collapse; margin: 20px 0; }
          th { background: #f0f0f0; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
          td { padding: 12px; border-bottom: 1px solid #eee; }
          .p1 { color: #0066cc; font-weight: bold; }
          .p2 { color: #ff9500; font-weight: bold; }
          a { color: #0066cc; text-decoration: none; }
          a:hover { text-decoration: underline; }
          </style>
          </head>
          <body>
          <div class="container">
          <h1>Job Search Intelligence Dashboard</h1>
          <p><strong>Ramzi Rahiman</strong> | Operations & Maintenance Engineering</p>
          <p style="color: #0066cc; font-weight: bold;">✓ Auto-Updated Daily at 8:00 PM Riyadh Time</p>
          
          <table>
          <tr><th>P</th><th>Track</th><th>Role</th><th>Company</th><th>Location</th><th>Fit</th><th>Salary</th><th>Link</th></tr>
          <tr><td><span class="p1">P1</span></td><td>Realistic</td><td><b>Maintenance Engineering Specialist</b></td><td>Saudi Aramco</td><td>Dhahran</td><td>8/10</td><td>SAR 180K–220K</td><td><a href="https://www.aramco.jobs/" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p2">P2</span></td><td>Realistic</td><td><b>Plant Operations Manager</b></td><td>SABIC</td><td>Jubail</td><td>7/10</td><td>SAR 200K–260K</td><td><a href="https://www.sabic.com/en/careers" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p2">P2</span></td><td>Realistic</td><td><b>Maintenance Supervisor</b></td><td>GE Power</td><td>Riyadh</td><td>6/10</td><td>SAR 160K–200K</td><td><a href="https://careers.ge.com/" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p2">P2</span></td><td>Realistic</td><td><b>Maintenance Manager</b></td><td>Kuwait NPL</td><td>Kuwait City</td><td>7/10</td><td>KWD 2,500–3,200</td><td><a href="https://www.knpc.com/careers" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p1">P1</span></td><td>Aspirational</td><td><b>Senior Operations Consultant</b></td><td>Accenture</td><td>Dubai</td><td>6/10</td><td>AED 180K–240K</td><td><a href="https://www.accenture.com/ae-en/careers" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p2">P2</span></td><td>Aspirational</td><td><b>Associate Principal – O&G</b></td><td>McKinsey</td><td>Dubai</td><td>5/10</td><td>AED 220K–300K+</td><td><a href="https://careers.mckinsey.com/" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p2">P2</span></td><td>Aspirational</td><td><b>Operations Director</b></td><td>AECOM</td><td>Riyadh</td><td>7/10</td><td>SAR 240K–300K</td><td><a href="https://careers.aecom.com/" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p1">P1</span></td><td>Pivot</td><td><b>Operations Lead</b></td><td>PredAI (Startup)</td><td>Remote</td><td>7/10</td><td>USD 55K–75K + equity</td><td><a href="https://www.linkedin.com/jobs/search/?keywords=predictive%20maintenance" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p2">P2</span></td><td>Pivot</td><td><b>Predictive Maintenance</b></td><td>Startups</td><td>Remote</td><td>6/10</td><td>USD 50K–70K + equity</td><td><a href="https://www.linkedin.com/jobs/search/?keywords=predictive%20maintenance" target="_blank">View ↗</a></td></tr>
          <tr><td><span class="p3">P3</span></td><td>Pivot</td><td><b>Asset Reliability Manager</b></td><td>DP World</td><td>Dubai</td><td>6/10</td><td>AED 150K–200K</td><td><a href="https://careers.dpworld.com/" target="_blank">View ↗</a></td></tr>
          </table>
          
          <p style="text-align: center; color: #999; font-size: 12px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">🤖 Auto-updated daily at 8:00 PM Riyadh time</p>
          </div>
          </body>
          </html>
          EOF
      
      - name: Commit and push
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@local"
          git add index.html
          git commit -m "🤖 Auto-update dashboard" || echo "No changes"
          git push || echo "Push failed"
