name: Update Job Dashboard Daily

on:
  schedule:
    - cron: '20 16 * * *'  # 8:00 PM Riyadh time (GMT+3), runs at 4:20 PM UTC
  workflow_dispatch:  # Also allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      
      - name: Install dependencies
        run: npm install axios cheerio
      
      - name: Run job scraper
        run: node update-jobs.js
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Job_Search_Dashboard_Updated_*.html
          git commit -m "Auto-update dashboard $(date +%Y-%m-%d)" || echo "No changes"
          git push
